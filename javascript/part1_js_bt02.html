<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="icon" href="data:,">


</head>
<body>
    <input type="text" value="92" id="jmass">
    <input type="text" value="1.95" id="jheight"> John<br><br>

    <input type="text" value="78" id="mmass">
    <input type="text" value="1.69" id="mheight"> Mark<br><br>

    <button id="btnCalculate">Calculate</button>
<script>
    document.getElementById("btnCalculate").addEventListener("click", function () {
    const johnMass = Number(document.getElementById("jmass").value);
    const johnHeight = Number(document.getElementById("jheight").value);
    const markMass = Number(document.getElementById("mmass").value);
    const markHeight = Number(document.getElementById("mheight").value);

    const johnBMI = johnMass / (johnHeight ** 2);
    const markBMI = markMass / (markHeight ** 2);

    if (markBMI > johnBMI) {
        console.log(
            `Mark's BMI (${markBMI.toFixed(1)}) is higher than John's (${johnBMI.toFixed(2)})!`
        );
    } else {
        console.log(
            `John's BMI (${johnBMI.toFixed(1)}) is higher than Mark's (${markBMI.toFixed(2)})!`
        );
    }
});
</script>

</body>
</html>
